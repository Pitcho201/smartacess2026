<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Editar Disciplina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Editar Disciplina: {{ disciplina.nome }} (ID: {{ disciplina.id }})</h2>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('editar_disciplina', id=disciplina.id) }}">
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome da Disciplina</label>
                    <input type="text" class="form-control" id="nome" name="nome" value="{{ disciplina.nome }}" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save-fill"></i> Salvar Alterações
                </button>
                <a href="{{ url_for('gerenciar_disciplinas') }}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
