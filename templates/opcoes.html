<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opções Administrativas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="bg-light">

<div class="container py-4">
  <h2 class="mb-4">⚙️ Opções Administrativas</h2>

  <form method="POST" action="/backup" onsubmit="return confirmarBackup()">
    <button type="submit" class="btn btn-dark mb-4">
      <i class="bi bi-download"></i> Fazer Backup Completo
    </button>
  </form>

  <div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white">
        <h5 class="mb-0">📊 Exportar Relatórios Detalhados</h5>
    </div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('exportar_csv') }}">
        <div class="mb-3">
          <label for="tipo_exportacao" class="form-label fw-bold">Selecione o Relatório:</label>
          <select id="tipo_exportacao" name="tipo" class="form-select">
            
            <optgroup label="Estudantes (Entradas e Cadastro)">
              <option value="entradas_csv">Registros de Entrada (CSV)</option>
              <option value="entradas_pdf">Registros de Entrada (PDF)</option>
              <option value="estudantes_csv">Cadastro Completo (CSV)</option>
              <option value="estudantes_pdf">Cadastro Completo (PDF)</option>
            </optgroup>

            <optgroup label="Funcionários (Ponto e Cadastro)">
              <option value="ponto_csv">Registros de Ponto (CSV)</option>
              <option value="ponto_pdf">Registros de Ponto (PDF)</option>
              <option value="funcionarios_csv">Cadastro Completo Func. (CSV)</option>
              <option value="funcionarios_pdf">Cadastro Completo Func. (PDF)</option>
            </optgroup>
          </select>
        </div>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-file-earmark-arrow-down"></i> Exportar Dados Selecionados
        </button>
      </form>
    </div>
  </div>


  <div class="card shadow-sm border-danger">
    <div class="card-header bg-danger text-white">
        <h5 class="mb-0">🗑️ Redefinir / Apagar Dados (Ação Irreversível)</h5>
    </div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('resetar_banco') }}" onsubmit="return confirmarReset()">
        <div class="mb-3">
          <label for="tipo_reset" class="form-label fw-bold">O que deseja Redefinir?</label>
          <select id="tipo_reset" name="tipo" class="form-select">
            <option value="entradas">Apenas Registros de Entrada (Estudantes e Funcionários)</option>
            <option value="estudantes">Estudantes, seus Registros e Fotos</option>
            <option value="funcionarios">Funcionários e Registros de Ponto</option>
            <option value="tudo">Tudo (Cadastros, Registros, Ofertas, Professores, etc.)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-danger w-100">
          <i class="bi bi-exclamation-triangle"></i> Redefinir Banco de Dados
        </button>
      </form>
    </div>
  </div>

  <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-4">
    <i class="bi bi-arrow-left"></i> Voltar ao Painel
  </a>
</div>

<script>
  function confirmarBackup() {
    return confirm("Deseja fazer o download do backup completo agora?");
  }

  function confirmarReset() {
    const tipo = document.getElementById('tipo_reset').options[document.getElementById('tipo_reset').selectedIndex].text;
    return confirm(`⚠️ Confirme a exclusão:\nVocê está prestes a apagar os seguintes dados: ${tipo}.\nEsta ação é irreversível. Deseja continuar?`);
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
